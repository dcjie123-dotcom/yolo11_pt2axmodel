name: YOLO11 Detect ONNX to AXModel

on:
  workflow_dispatch:
    inputs:
      pt_glob:
        description: "PT files to export"
        required: true
        default: "model_export/data_need/best.pt"
      calib_images_dir:
        description: "Calibration images directory"
        required: true
        default: "model_export/data_need/calib_images"
      model_name:
        description: "Output model base name"
        required: true
        default: "yolo11_detect"
      image_size:
        description: "YOLO export image size. Use 640 or height width, for example 384 640"
        required: true
        default: "480 640"
      opset:
        description: "ONNX opset"
        required: true
        default: "17"
      calibration_size:
        description: "Number of calibration images"
        required: true
        default: "100"
      input_names:
        description: "ONNX input tensor names"
        required: true
        default: "images"
      output_names:
        description: "YOLO11 quantization output tensor names"
        required: true
        default: "/model.23/Concat_output_0,/model.23/Concat_1_output_0,/model.23/Concat_2_output_0"
      labels:
        description: "Comma-separated labels used when labels.txt does not exist"
        required: true
        default: "model_export/data_need/labels.txt"
      pulsar2_image:
        description: "Docker image containing pulsar2 and onnxsim"
        required: true
        default: "pulsar2:6.0"
      pulsar2_tar_url:
        description: "Pulsar2 docker image tar.gz URL"
        required: false
        default: "https://huggingface.co/AXERA-TECH/Pulsar2/resolve/main/6.0/ax_pulsar2_6.0.tar.gz?download=true"

jobs:
  pt2onnx:
    name: pt2onnx
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install export dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ultralytics==8.3.39 onnx onnxsim

      - name: Export PT to ONNX
        env:
          IMAGE_SIZE: ${{ inputs.image_size }}
        run: |
          read -r -a IMAGE_SIZE_ARGS <<< "$IMAGE_SIZE"
          python model_export/pt2onnx.py \
            --pt-glob "${{ inputs.pt_glob }}" \
            --out-dir model_export/build/onnx \
            --imgsz "${IMAGE_SIZE_ARGS[@]}" \
            --opset "${{ inputs.opset }}"

      - name: Extract and simplify ONNX for Pulsar2
        run: |
          set -euo pipefail
          mkdir -p model_export/build/pulsar_onnx
          mkdir -p model_export/build/pulsar_onnx_tmp
          mkdir -p model_export/build/onnx_metadata
          for ONNX_PATH in model_export/build/onnx/*.onnx; do
            MODEL_STEM="$(basename "$ONNX_PATH" .onnx)"
            EXTRACTED_PATH="model_export/build/pulsar_onnx_tmp/${MODEL_STEM}_extracted.onnx"
            SIMPLIFIED_PATH="model_export/build/pulsar_onnx/${MODEL_STEM}.onnx"
            OUTPUT_NAMES="${{ inputs.output_names }}"
            echo "$OUTPUT_NAMES" > "model_export/build/onnx_metadata/${MODEL_STEM}.outputs.txt"
            echo "Using output names: $OUTPUT_NAMES"
            python model_export/extract_onnx.py \
              "$ONNX_PATH" \
              "$EXTRACTED_PATH" \
              "${{ inputs.input_names }}" \
              "$OUTPUT_NAMES"
            onnxsim "$EXTRACTED_PATH" "$SIMPLIFIED_PATH"
            python model_export/inspect_onnx_outputs.py \
              "$SIMPLIFIED_PATH" \
              --output "model_export/build/onnx_metadata/${MODEL_STEM}.outputs.json" \
              --require-rank 4
          done

      - name: Upload ONNX artifact
        uses: actions/upload-artifact@v4
        with:
          name: yolo11-onnx
          path: model_export/build/pulsar_onnx/*.onnx
          if-no-files-found: error

      - name: Upload ONNX metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: yolo11-onnx-metadata
          path: |
            model_export/build/onnx_metadata/*.json
            model_export/build/onnx_metadata/*.txt
          if-no-files-found: error

      - name: Upload calibration images
        uses: actions/upload-artifact@v4
        with:
          name: yolo11-calibration-images
          path: ${{ inputs.calib_images_dir }}
          if-no-files-found: error

      - name: Upload labels when present
        uses: actions/upload-artifact@v4
        with:
          name: yolo11-labels
          path: model_export/data_need/labels.txt
          if-no-files-found: ignore

  onnx2axmodel:
    name: onnx2axmodel
    runs-on: ubuntu-latest
    needs: pt2onnx
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download ONNX artifact
        uses: actions/download-artifact@v4
        with:
          name: yolo11-onnx
          path: model_export/build/onnx

      - name: Download ONNX metadata artifact
        uses: actions/download-artifact@v4
        with:
          name: yolo11-onnx-metadata
          path: model_export/build/onnx_metadata

      - name: Download calibration images
        uses: actions/download-artifact@v4
        with:
          name: yolo11-calibration-images
          path: model_export/build/calib_images

      - name: Download labels when present
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: yolo11-labels
          path: model_export/build

      - name: Create Pulsar2 cache directory
        run: mkdir -p .cache/pulsar2

      - name: Restore Pulsar2 image cache
        id: pulsar2-cache
        uses: actions/cache@v4
        with:
          path: .cache/pulsar2/ax_pulsar2_6.0.tar.gz
          key: pulsar2-image-6.0

      - name: Prepare Pulsar2 docker image
        env:
          PULSAR2_IMAGE: ${{ inputs.pulsar2_image }}
          PULSAR2_TAR_URL: ${{ inputs.pulsar2_tar_url }}
        run: |
          set -euo pipefail
          PULSAR2_TAR=".cache/pulsar2/ax_pulsar2_6.0.tar.gz"
          if [ -n "$PULSAR2_TAR_URL" ]; then
            if [ ! -s "$PULSAR2_TAR" ]; then
              curl -L "$PULSAR2_TAR_URL" -o "$PULSAR2_TAR"
            fi
            docker load -i "$PULSAR2_TAR"
          fi
          docker image inspect "$PULSAR2_IMAGE" >/dev/null 2>&1 || docker pull "$PULSAR2_IMAGE"

      - name: Convert ONNX to AXModel
        env:
          PULSAR2_IMAGE: ${{ inputs.pulsar2_image }}
        run: |
          set -euo pipefail
          ONNX_PATH="$(find model_export/build/onnx -maxdepth 1 -name '*.onnx' | head -n 1)"
          if [ -z "$ONNX_PATH" ]; then
            echo "No ONNX artifact found"
            exit 1
          fi
          ONNX_STEM="$(basename "$ONNX_PATH" .onnx)"
          OUTPUT_METADATA="/workspace/model_export/build/onnx_metadata/${ONNX_STEM}.outputs.json"
          OUTPUT_NAMES_PATH="model_export/build/onnx_metadata/${ONNX_STEM}.outputs.txt"
          if [ ! -s "$OUTPUT_NAMES_PATH" ]; then
            echo "No output names file found: $OUTPUT_NAMES_PATH"
            find model_export/build/onnx_metadata -maxdepth 2 -type f -print
            exit 1
          fi
          OUTPUT_NAMES="$(cat "$OUTPUT_NAMES_PATH")"
          docker run --rm --privileged \
            -v "$PWD:/workspace" \
            -w /workspace \
            "$PULSAR2_IMAGE" \
            -ic "set -euo pipefail && \
              export PATH=/usr/local/bin/.venv/bin:/root/.local/bin:/opt/pulsar2/bin:\$PATH && \
              if ! command -v pulsar2 >/dev/null 2>&1; then \
                PULSAR2_BIN=\$(find / -type f -name pulsar2 -perm /111 2>/dev/null | head -n 1); \
                if [ -z \"\$PULSAR2_BIN\" ]; then \
                  echo 'pulsar2 command not found in container'; \
                  exit 1; \
                fi; \
                export PATH=\"\$(dirname \"\$PULSAR2_BIN\"):\$PATH\"; \
              fi && \
              command -v pulsar2 && \
              pulsar2 version && \
              python model_export/onnx2axmodel.py \
              --onnx '/workspace/$ONNX_PATH' \
              --out-dir /workspace/model_export/build/axmodel \
              --model-name '${{ inputs.model_name }}' \
              --calib-images /workspace/model_export/build/calib_images \
              --calib-size '${{ inputs.calibration_size }}' \
              --input-names '${{ inputs.input_names }}' \
              --output-names '$OUTPUT_NAMES' \
              --labels '${{ inputs.labels }}' \
              --labels-file /workspace/model_export/build/labels.txt \
              --output-metadata '$OUTPUT_METADATA' \
              --no-extract \
              --no-simplify"

      - name: Upload AXModel and MUD
        uses: actions/upload-artifact@v4
        with:
          name: yolo11-axmodel-maixcam2
          path: |
            model_export/build/axmodel/*.axmodel
            model_export/build/axmodel/*.mud
          if-no-files-found: error
