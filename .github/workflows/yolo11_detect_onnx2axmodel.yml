name: YOLO11 Detect ONNX to AXModel

on:
  workflow_dispatch:
    inputs:
      pt_glob:
        description: "PT files to export"
        required: true
        default: "model_export/data_need/*.pt"
      calib_images_dir:
        description: "Calibration images directory"
        required: true
        default: "model_export/data_need/calib_images"
      model_name:
        description: "Output model base name"
        required: true
        default: "yolo11_detect"
      image_size:
        description: "YOLO export image size. Use 640 or height width, for example 384 640"
        required: true
        default: "640"
      opset:
        description: "ONNX opset"
        required: true
        default: "12"
      calibration_size:
        description: "Number of calibration images"
        required: true
        default: "100"
      input_names:
        description: "ONNX input tensor names"
        required: true
        default: "images"
      output_names:
        description: "YOLO11 quantization output tensor names"
        required: true
        default: "/model.23/Concat_output_0,/model.23/Concat_1_output_0,/model.23/Concat_2_output_0"
      labels:
        description: "Comma-separated labels used when labels.txt does not exist"
        required: true
        default: "class0"
      pulsar2_image:
        description: "Docker image containing pulsar2 and onnxsim"
        required: true
        default: "pulsar2:6.0"
      pulsar2_tar_url:
        description: "Pulsar2 docker image tar.gz URL"
        required: false
        default: "https://huggingface.co/AXERA-TECH/Pulsar2/resolve/main/6.0/ax_pulsar2_6.0.tar.gz?download=true"

jobs:
  pt2onnx:
    name: pt2onnx
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install export dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ultralytics onnx onnxsim

      - name: Export PT to ONNX
        run: |
          python model_export/pt2onnx.py \
            --pt-glob "${{ inputs.pt_glob }}" \
            --out-dir model_export/build/onnx \
            --imgsz "${{ inputs.image_size }}" \
            --opset "${{ inputs.opset }}"

      - name: Upload ONNX artifact
        uses: actions/upload-artifact@v4
        with:
          name: yolo11-onnx
          path: model_export/build/onnx/*.onnx
          if-no-files-found: error

      - name: Upload calibration images
        uses: actions/upload-artifact@v4
        with:
          name: yolo11-calibration-images
          path: ${{ inputs.calib_images_dir }}
          if-no-files-found: error

      - name: Upload labels when present
        uses: actions/upload-artifact@v4
        with:
          name: yolo11-labels
          path: model_export/data_need/labels.txt
          if-no-files-found: ignore

  onnx2axmodel:
    name: onnx2axmodel
    runs-on: ubuntu-latest
    needs: pt2onnx
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download ONNX artifact
        uses: actions/download-artifact@v4
        with:
          name: yolo11-onnx
          path: model_export/build/onnx

      - name: Download calibration images
        uses: actions/download-artifact@v4
        with:
          name: yolo11-calibration-images
          path: model_export/build/calib_images

      - name: Download labels when present
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: yolo11-labels
          path: model_export/build

      - name: Prepare Pulsar2 docker image
        env:
          PULSAR2_IMAGE: ${{ inputs.pulsar2_image }}
          PULSAR2_TAR_URL: ${{ inputs.pulsar2_tar_url }}
        run: |
          set -euo pipefail
          if [ -n "$PULSAR2_TAR_URL" ]; then
            curl -L "$PULSAR2_TAR_URL" -o pulsar2_image.tar.gz
            docker load -i pulsar2_image.tar.gz
          fi
          docker image inspect "$PULSAR2_IMAGE" >/dev/null 2>&1 || docker pull "$PULSAR2_IMAGE"

      - name: Convert ONNX to AXModel
        env:
          PULSAR2_IMAGE: ${{ inputs.pulsar2_image }}
        run: |
          set -euo pipefail
          ONNX_PATH="$(find model_export/build/onnx -maxdepth 1 -name '*.onnx' | head -n 1)"
          if [ -z "$ONNX_PATH" ]; then
            echo "No ONNX artifact found"
            exit 1
          fi
          docker run --rm --privileged \
            -v "$PWD:/workspace" \
            -w /workspace \
            "$PULSAR2_IMAGE" \
            python model_export/onnx2axmodel.py \
              --onnx "/workspace/$ONNX_PATH" \
              --out-dir /workspace/model_export/build/axmodel \
              --model-name "${{ inputs.model_name }}" \
              --calib-images /workspace/model_export/build/calib_images \
              --calib-size "${{ inputs.calibration_size }}" \
              --input-names "${{ inputs.input_names }}" \
              --output-names "${{ inputs.output_names }}" \
              --labels "${{ inputs.labels }}" \
              --labels-file /workspace/model_export/build/labels.txt

      - name: Upload AXModel and MUD
        uses: actions/upload-artifact@v4
        with:
          name: yolo11-axmodel-maixcam2
          path: |
            model_export/build/axmodel/*.axmodel
            model_export/build/axmodel/*.mud
          if-no-files-found: error
